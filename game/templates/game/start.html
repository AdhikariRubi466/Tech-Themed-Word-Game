<!DOCTYPE html>
<html>
<head>
    <title>Tech Word Game</title>
    {% load static %}

    <style>
        body {
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            padding-top: 100px;
            background-image: url(Blue\ Mountain\ Calendar\ Wallpaper\ HD.jpg);
            background-size: cover;
            margin : 0;

            /* Background Image */
            background-image: url("/static/images/mt.jpg");
            background-size: cover;
            background-repeat: no-repeat;
        }

        select, button {
            padding: 10px;
            margin-top: 20px;
            font-size: 16px;
        }

        button {
            background-color: #00adb5;
            border: none;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #007f83;
        }
    </style>
</head>
<body>

<h1>🚀 Tech Word Guess Game</h1>
<p>Select Difficulty to Start</p>

<form method="post">
    {% csrf_token %}
    <select name="difficulty">
        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>
    </select>
    <br>
    <button type="submit">Continue</button>
</form>

</body>
</html>
