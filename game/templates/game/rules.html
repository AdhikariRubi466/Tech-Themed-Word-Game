<!DOCTYPE html>
<html>
<head>
    <title>Game Rules</title>
    {% load static %}

    <style>
        body {
            color: white;
            font-family: Arial;
            text-align: center;
            padding-top: 80px;
            background-image: url(Blue\ Mountain\ Calendar\ Wallpaper\ HD.jpg);
            background-size: cover;

            /* Background Image */
            background-image: url("/static/images/mt.jpg");
            background-size: cover;
            background-repeat: no-repeat;
        }

       .container {
    width: 420px;
    padding: 35px;
    border-radius: 15px;

    /* Bright transparent white */
    background: rgba(255, 255, 255, 0.35);

    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    border: 1px solid rgba(255, 255, 255, 0.4);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);

    color: black;   /* important for readability */
}
        button {
            margin-top: 20px;
            padding: 10px 25px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            background: #00adb5;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #007f83;
        }
    </style>
</head>
<body>

<div class="rules-box">
    <h1>📜 Game Rules</h1>

    <p>You have 6 attempts to guess the secret 5-letter word.</p>
    <p>🟢 Green = Correct letter in correct position</p>
    <p>🟡 Orange = Letter exists but wrong position</p>
    <p>⚪ Gray = Letter not in word</p>
    <p>Memorize the word list carefully before starting.</p>

    <form action="/play/">
        <button type="submit">Next → Start Game</button>
    </form>
</div>

</body>
</html>
